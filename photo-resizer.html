<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HDR 相片整理工具</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html"><span>Young HDR</span></a>
      <nav class="topnav" aria-label="工具導覽">
        <a href="index.html">回網站</a>
      </nav>
    </header>

    <main class="site-shell tool-shell">
      <section class="tool-hero">
        <p class="eyebrow">Local Tool</p>
        <h1>HDR 相片整理工具</h1>
        <p>
          選擇相片後，工具會在瀏覽器內產生較小的網頁版預覽圖，適合放在網站快速載入。原始 HDR 檔案請保留，讓使用者點開觀看完整品質。
        </p>
      </section>

      <section class="tool-panel" aria-label="相片縮小工具">
        <label class="file-drop">
          <input id="photoInput" type="file" accept="image/*" multiple />
          <span>選擇 HDR 相片</span>
        </label>

        <div class="tool-controls">
          <label>
            長邊尺寸
            <select id="maxSize">
              <option value="1600">1600px 快速</option>
              <option value="2048" selected>2048px 平衡</option>
              <option value="2400">2400px 高畫質</option>
            </select>
          </label>
          <label>
            品質
            <input id="quality" type="range" min="0.65" max="0.95" step="0.05" value="0.82" />
          </label>
          <label>
            輸出格式
            <select id="format">
              <option value="image/webp" selected>WebP</option>
              <option value="image/jpeg">JPEG</option>
            </select>
          </label>
        </div>

        <div class="tool-note">
          瀏覽器縮圖通常會變成 SDR 預覽圖。這是為了速度；原始 HDR AVIF/JPG/HEIC 請另外保留並在網站中作為「開啟原圖」連結。
        </div>

        <div id="resizeResults" class="resize-results"></div>
      </section>
    </main>

    <script src="photo-resizer.js"></script>
  </body>
</html>
