<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Young HDR Gallery full-page HDR photo stream."
    />
    <title>HDR Photos - Young HDR Gallery</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="photo-viewer-page">
    <header class="topbar">
      <a class="brand" href="index.html#home" aria-label="Young Hung HDR Studio">
        <span class="brand-script">Young Hung</span>
        <span class="brand-studio">HDR Studio</span>
      </a>
      <nav class="topnav" aria-label="Main navigation">
        <a href="index.html#videos">HDR 影片</a>
        <a href="index.html#photos" class="active">HDR 相片</a>
        <a href="index.html#notes">旅遊</a>
      </nav>
    </header>

    <main class="photo-stream" aria-labelledby="photoStreamTitle">
      <section class="photo-stream-hero">
        <p class="eyebrow">HDR Photography</p>
        <h1 id="photoStreamTitle">HDR Photos</h1>
        <p>
          光影稍縱即逝，而記憶總在片刻之間停留。透過 HDR，保留肉眼所見的層次與溫度，記錄每一次與世界相遇的瞬間。
        </p>
        <p>
          Light fades in an instant, while memories remain. Through HDR photography, I preserve the depth,
          contrast, and emotion of the moments where life meets light.
        </p>
      </section>

      <section class="photo-stream-list" id="photoStreamList" aria-label="HDR photo stream"></section>
    </main>

    <script src="site-data.js"></script>
    <script>
      const photoData = window.HDR_SITE_DATA || {};
      const homePhotos = photoData.photos || [];
      const photos = photoData.photoDetails || photoData.photos || [];
      const params = new URLSearchParams(window.location.search);
      const requestedPhoto = params.get("photo") || "";
      const list = document.querySelector("#photoStreamList");

      function photoPath(photo) {
        return photo.fullSrc || photo.src || "";
      }

      function orderedPhotos() {
        const selected = [...homePhotos, ...photos].find((photo) => photoPath(photo) === requestedPhoto);
        if (!selected) return photos;
        return [selected, ...photos.filter((photo) => photoPath(photo) !== requestedPhoto)];
      }

      function renderPhotoStream() {
        list.replaceChildren();

        if (!photos.length) {
          const empty = document.createElement("p");
          empty.className = "empty-state";
          empty.textContent = "No HDR photos yet.";
          list.appendChild(empty);
          return;
        }

        for (const photo of orderedPhotos()) {
          const figure = document.createElement("figure");
          const image = document.createElement("img");
          const caption = document.createElement("figcaption");
          const src = photoPath(photo);

          figure.className = "photo-stream-item";
          figure.id = src.replace(/[^a-zA-Z0-9_-]+/g, "-");

          image.src = src;
          image.alt = photo.title || "HDR Photo";
          image.loading = "lazy";

          caption.textContent = photo.title || "HDR Photo";
          figure.append(image, caption);
          list.appendChild(figure);
        }
      }

      renderPhotoStream();
    </script>
  </body>
</html>
