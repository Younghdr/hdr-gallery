<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Young HDR 作品集，展示 HDR YouTube 影片、HDR 相片、3C 測試與旅遊拍攝紀錄。"
    />
    <title>Young HDR Gallery</title>
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#home" aria-label="Young Hung HDR Studio">
        <span class="brand-script">Young Hung</span>
        <span class="brand-studio">HDR Studio</span>
      </a>
      <nav class="topnav" aria-label="主要導覽">
        <a href="#videos">HDR 影片</a>
        <a href="#photos">HDR 相片</a>
        <a href="#notes">旅遊</a>
      </nav>
    </header>

    <main id="home" class="site-shell">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-copy">
          <p class="eyebrow">Young Hung HDR Studio</p>
          <h1 id="hero-title">HDR 作品集</h1>
          <p class="intro">
            這裡整理我的 HDR YouTube 影片、HDR 相片、3C 測試與旅遊拍攝紀錄。以作品集方式呈現不同主題，方便快速瀏覽與分享。
          </p>
          <div class="hero-actions">
            <a class="primary-link" id="hdrWatchLink" href="#" target="_blank" rel="noopener">
              觀看 HDR 影片
            </a>
            <a class="secondary-link" href="#photos">瀏覽 HDR 相片</a>
          </div>
        </div>

        <div class="video-stage" aria-label="HDR YouTube 影片播放器">
          <div class="video-frame" id="featuredVideoFrame">
            <div class="video-placeholder" id="featuredVideoPlaceholder">
              <span>等待載入 YouTube HDR 影片</span>
            </div>
          </div>
        </div>
      </section>

      <section class="portfolio-intro" aria-label="作品分類">
        <div class="switch-row" id="categoryTabs" aria-label="主題分類"></div>
      </section>

      <section id="videos" class="portfolio-section" aria-labelledby="videos-title">
        <div class="section-heading">
          <p class="eyebrow">HDR Films</p>
          <h2 id="videos-title">HDR 影片</h2>
        </div>
        <div class="content-grid" id="videoGrid" aria-live="polite"></div>
      </section>

      <section id="photos" class="portfolio-section" aria-labelledby="photos-title">
        <div class="section-heading">
          <p class="eyebrow">HDR Photography</p>
          <h2 id="photos-title">HDR 相片</h2>
        </div>
        <div class="photo-mosaic" id="photoMosaic" aria-label="相片馬賽克精選"></div>
      </section>

      <section id="notes" class="portfolio-section" aria-labelledby="notes-title">
        <div class="section-heading">
          <p class="eyebrow">Travel Journal</p>
          <h2 id="notes-title">旅遊紀錄</h2>
        </div>
        <div class="content-grid" id="noteGrid" aria-live="polite"></div>
      </section>
    </main>

    <script src="site-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
